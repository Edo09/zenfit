<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>%WEB_TITLE%</title>
    <script>
      // Pre-paint theme restore: an explicit light/dark choice (saved under
      // "app_theme" by src/theme/theme-mode.ts via AsyncStorage→localStorage)
      // must apply before first paint, or reloads flash the OS scheme.
      try {
        var mode = localStorage.getItem('app_theme');
        if (mode === 'light' || mode === 'dark') {
          document.documentElement.classList.add(mode);
          document.documentElement.style.colorScheme = mode;
        }
      } catch (e) {}
    </script>
    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>

    <link rel="manifest" href="/manifest.json" />
    <!-- Browser chrome color (address bar / task switcher). Matches the
         app canvas per scheme — keep in sync with src/theme/colors.ts. -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f8fafc" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f172a" />

    <!-- iOS Safari ignores the manifest for install prompts; it needs these
         specific tags to behave like an installed app. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="The Hokage" />
    <link rel="apple-touch-icon" href="/icons/icon-512.png" />
  </head>

  <body>
    <!-- Use static rendering with Expo Router to support running without JavaScript. -->
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <!-- The root element for your Expo app. -->
    <div id="root"></div>
  </body>
</html>
